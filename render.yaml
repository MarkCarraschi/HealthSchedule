services:
  - type: web
    name: health-schedule-api
    env: docker
    plan: free
    region: oregon # Altere conforme sua preferência (us-west, us-east, eu-west, etc)
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
    
